<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JigTile Support</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 18px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 30px rgba(0,0,0,0.08);
    }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 { font-size: 28px; font-weight: 700; color: #1d1d1f; margin-bottom: 12px; }
    p { font-size: 16px; color: #6e6e73; line-height: 1.6; margin-bottom: 32px; }
    .support-btn {
      display: inline-block;
      background: #007aff;
      color: white;
      text-decoration: none;
      font-size: 17px;
      font-weight: 600;
      padding: 14px 36px;
      border-radius: 980px;
      transition: background 0.2s;
    }
    .support-btn:hover { background: #0066d6; }
    .footer { margin-top: 32px; font-size: 13px; color: #aeaeb2; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🧩</div>
    <h1>JigTile Support</h1>
    <p>Having trouble or have a question? We are here to help. Tap the button below to send us an email and we will get back to you as soon as possible.</p>
    <a class="support-btn" href="mailto:aylinyazici12@gmail.com?subject=JigTile%20Support">Contact Support</a>
    <div class="footer">aylinyazici12@gmail.com</div>
  </div>
</body>
</html>
